generation:
  shared:
    scene_variant_weights:
      standard_board: 1.0
    style_variant_weights:
      classic: 1.0
      dark: 1.0
      paper: 1.0
      neon: 1.0
      pastel: 1.0
    move_direction_weights:
      up: 1.0
      down: 1.0
      left: 1.0
      right: 1.0
    balanced_scene_variant_sampling: true
    balanced_style_variant_sampling: true
    balanced_move_direction_sampling: true
  task_overrides:
    task_games__2048__merge_count:
      balanced_target_answer_sampling: true
      merge_count_support:
        - 0
        - 1
        - 2
        - 3
        - 4
    task_games__2048__max_tile_value:
      balanced_target_answer_sampling: true
      max_tile_value_support:
        - 16
        - 32
        - 64
        - 128
        - 256
    task_games__2048__move_result_board_label:
      balanced_target_label_sampling: true
      balanced_result_board_option_count_sampling: true
      result_board_label_support:
        - A
        - B
        - C
        - D
        - E
        - F
      result_board_option_count_support:
        - 4
        - 6
