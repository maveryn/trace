      balanced_capture_option_count_sampling: true
      balanced_capture_distance_sampling: true
    task_games__ludo_board__move_result_option_label:
      answer_option_label_weights:
        A: 1.0
        B: 1.0
        C: 1.0
        D: 1.0
        E: 1.0
        F: 1.0
      move_roll_total_support:
      - 1
