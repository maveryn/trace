      - 5
      - 6
      balanced_answer_option_label_sampling: true
      balanced_move_result_option_count_sampling: true
      balanced_move_roll_total_sampling: true
rendering:
  shared:
    canvas_width: 920
    canvas_height: 980
    canvas_side_padding_px: 180
    canvas_vertical_padding_px: 210
    board_padding_px: 24
    cell_size_min_px: 36
    cell_size_max_px: 48
    grid_width_px: 2
    token_radius_fraction: 0.36
    flow_arrow_enabled: true
    flow_arrow_width_px: 2
    option_card_width_px: 112
    option_card_height_px: 54
    option_card_gap_px: 10
prompt:
  shared:
    bundle_id: games_ludo_board_v1
    scene_key: ludo_board
    task_key: ludo_board_query
visual:
  noise:
    apply_prob: 0.5
    edit_count_range:
    - 1
    - 1
    value_ranges:
      blur:
        radius:
        - 0.15
        - 0.4
      downsample:
        scale:
        - 0.9
        - 0.97
      jpeg:
        quality:
        - 78.0
        - 94.0
      noise:
        alpha:
        - 0.015
        - 0.045
