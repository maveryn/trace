prompt:
  shared:
    json_output_contract: Use a valid JSON object with keys "annotation" and "answer" in that order for the final answer.
    json_output_contract_answer_only: Use a valid JSON object with key "answer" for the final answer.

rendering:
  shared:
    layout_jitter_enabled: true
    layout_jitter_mode: slack_fraction
    layout_jitter_x_slack_fraction_min: -0.75
    layout_jitter_x_slack_fraction_max: 0.75
    layout_jitter_y_slack_fraction_min: -0.7
    layout_jitter_y_slack_fraction_max: 0.7
    layout_jitter_min_margin_px: 16

visual:
  background:
    enabled: true
    styles:
      felt_green:
        kind: solid
        color: [42, 92, 74]
      felt_deep_green:
        kind: solid
        color: [34, 78, 66]
      felt_blue_green:
        kind: solid
        color: [43, 88, 94]
      felt_olive:
        kind: solid
        color: [68, 90, 58]
      table_slate:
        kind: solid
        color: [58, 72, 78]
      felt_charcoal:
        kind: solid
        color: [42, 54, 58]
      felt_navy:
        kind: solid
        color: [38, 55, 82]
      warm_table:
        kind: solid
        color: [86, 72, 58]
      muted_burgundy:
        kind: solid
        color: [82, 52, 60]
    weights:
      felt_green: 1.0
      felt_deep_green: 1.0
      felt_blue_green: 1.0
      felt_olive: 1.0
      table_slate: 1.0
      felt_charcoal: 1.0
      felt_navy: 1.0
      warm_table: 1.0
      muted_burgundy: 1.0
  noise:
    apply_prob: 0.5
    edit_count_range: [1, 1]
    value_ranges:
      blur:
        radius: [0.15, 0.4]
      downsample:
        scale: [0.9, 0.97]
      jpeg:
        quality: [78.0, 94.0]
      noise:
        alpha: [0.015, 0.045]
