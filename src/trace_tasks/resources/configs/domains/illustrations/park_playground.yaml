prompt:
  task_overrides:
    task_illustrations__park_playground__person_count:
      bundle_id: illustrations_park_playground_v0
      scene_key: park_playground_canvas
      task_key: person_count_task
      answer_hint_person_count: set "answer" to the total count of visible people as an integer
      annotation_hint_person_count: set "annotation" to a JSON array of [x0, y0, x1, y1] boxes in image pixel coordinates around each visible person
      json_example_person_count: '{"annotation":[[176,511,236,611],[486,593,546,693],[824,455,884,555]],"answer":3}'
      json_example_answer_only_person_count: '{"answer":3}'
    task_illustrations__park_playground__playground_equipment_count:
      bundle_id: illustrations_park_playground_v0
      scene_key: park_playground_canvas
      task_key: playground_equipment_count_task
      answer_hint_playground_equipment: set "answer" to the count of {equipment_name} as an integer
      annotation_hint_playground_equipment: set "annotation" to a JSON array of [x0, y0, x1, y1] boxes in image pixel coordinates around each counted {equipment_name}
      json_example_playground_equipment: '{"annotation":[[162,315,282,435],[430,335,558,455],[700,309,836,429]],"answer":3}'
      json_example_answer_only_playground_equipment: '{"answer":3}'
    task_illustrations__park_playground__jigsaw_arrangement_label:
      bundle_id: illustrations_park_playground_v0
      scene_key: park_playground_canvas
      task_key: jigsaw_arrangement_label_task
      answer_hint_jigsaw_arrangement: set "answer" to the selected option letter
      annotation_hint_jigsaw_arrangement: set "annotation" to one [x0, y0,
        x1, y1] box around the selected option image in pixel coordinates
      json_example_jigsaw_arrangement: '{"annotation":[594,478,1114,844],"answer":"C"}'
      json_example_answer_only_jigsaw_arrangement: '{"answer":"C"}'
    task_illustrations__park_playground__missing_patch_label:
      bundle_id: illustrations_park_playground_v0
      scene_key: park_playground_canvas
      task_key: missing_patch_label_task
      answer_hint_missing_patch: set "answer" to the selected option letter
      annotation_hint_missing_patch: set "annotation" to a JSON object with "missing_region" and "selected_option" keys, each mapped to a [x0, y0, x1, y1] pixel box
      json_example_missing_patch: '{"annotation":{"missing_region":[152,188,356,330],"selected_option":[708,612,912,754]},"answer":"C"}'
      json_example_answer_only_missing_patch: '{"answer":"C"}'
    task_illustrations__park_playground__rotated_tile_label:
      bundle_id: illustrations_park_playground_v0
      scene_key: park_playground_canvas
      task_key: rotated_tile_label_task
      answer_hint_rotated_tile: set "answer" to the selected tile letter
      annotation_hint_rotated_tile: set "annotation" to one [x0, y0, x1,
        y1] box around the rotated tile in pixel coordinates
      json_example_rotated_tile: '{"annotation":[438,168,756,436],"answer":"B"}'
      json_example_answer_only_rotated_tile: '{"answer":"B"}'
    task_illustrations__park_playground__swapped_tile_pair_label:
      bundle_id: illustrations_park_playground_v0
      scene_key: park_playground_canvas
      task_key: swapped_tile_pair_label_task
      answer_hint_swapped_tile_pair: set "answer" to the selected option letter
      annotation_hint_swapped_tile_pair: set "annotation" to a JSON array containing two [x0, y0, x1, y1] boxes around the two swapped numbered cells
      json_example_swapped_tile_pair: '{"annotation":[[0,0,400,266],[800,532,1200,798]],"answer":"C"}'
      json_example_answer_only_swapped_tile_pair: '{"answer":"C"}'
