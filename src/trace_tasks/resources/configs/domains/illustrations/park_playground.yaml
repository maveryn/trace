generation:
  shared:
    balanced_sampling: true
    activity_support:
      - sitting
      - walking
      - standing
      - playing_ball
    zone_support:
      - playground
      - garden
    equipment_type_support:
      - slide
      - swing_set
      - seesaw
      - climbing_frame
  task_overrides:
    task_illustrations__park_playground__person_count:
      person_count_min: 5
      person_count_max: 12
    task_illustrations__park_playground__playground_equipment_count:
      equipment_count_min: 4
      equipment_count_max: 7
      target_count_min: 1
      target_count_max: 5
      person_count_min: 5
      person_count_max: 9
    task_illustrations__park_playground__jigsaw_arrangement_label:
      person_count_min: 8
      person_count_max: 13
      equipment_count_min: 4
      equipment_count_max: 7
      min_tile_detail_score: 600
    task_illustrations__park_playground__missing_patch_label:
      source_person_count_min: 8
      source_person_count_max: 13
      source_equipment_count_min: 4
      source_equipment_count_max: 7
      option_count_support:
        - 4
        - 6
      patch_width_ratio_min: 0.15
      patch_width_ratio_max: 0.30
      patch_height_ratio_min: 0.15
      patch_height_ratio_max: 0.26
      patch_area_ratio_max: 0.065
      crop_margin_px: 36
    task_illustrations__park_playground__rotated_tile_label:
      source_person_count_min: 8
      source_person_count_max: 13
      source_equipment_count_min: 4
      source_equipment_count_max: 7
      min_tile_detail_score: 180
      min_rotation_delta: 7
      rotation_degrees_support:
        - 90
        - 270
    task_illustrations__park_playground__swapped_tile_pair_label:
      source_person_count_min: 8
      source_person_count_max: 13
      source_equipment_count_min: 4
      source_equipment_count_max: 7
      min_tile_detail_score: 180
      min_pair_difference: 8

