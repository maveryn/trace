        outlined_cartoon: 1.0
        paper_cutout: 1.0
        soft_shadow: 1.0
        ink_sketch: 1.0
        watercolor_wash: 1.0
    task_illustrations__library__rotated_tile_label:
      art_style_support:
        - flat_vector
        - outlined_cartoon
        - paper_cutout
        - soft_shadow
        - ink_sketch
        - watercolor_wash
      art_style_weights:
        flat_vector: 1.0
        outlined_cartoon: 1.0
