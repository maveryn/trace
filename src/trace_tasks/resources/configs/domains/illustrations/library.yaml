generation:
  shared:
    balanced_sampling: true
    section_count_min: 4
    section_count_max: 6
    section_key_support:
      - history
      - science
      - art
      - travel
      - fiction
      - nature
      - music
      - math
    color_name_support:
      - red
      - blue
      - green
      - orange
      - purple
      - cyan
      - magenta
  task_overrides:
    task_illustrations__library__books_in_section_count:
      target_count_min: 3
      target_count_max: 8
      section_book_count_min: 5
      section_book_count_max: 12
    task_illustrations__library__filtered_book_in_section_count:
      target_count_min: 1
      target_count_max: 6
      section_book_count_min: 7
      section_book_count_max: 14
    task_illustrations__library__rotated_tile_label:
      section_count_min: 4
      section_count_max: 6
      section_book_count_min: 8
      section_book_count_max: 14
      rotation_degrees_support:
        - 90
        - 270
      min_tile_detail_score: 160
      min_rotation_delta: 7
    task_illustrations__library__swapped_tile_pair_label:
      section_count_min: 4
      section_count_max: 6
      section_book_count_min: 8
      section_book_count_max: 14
      min_tile_detail_score: 130
      min_pair_difference: 7
    task_illustrations__library__missing_patch_label:
      section_count_min: 4
      section_count_max: 6
      section_book_count_min: 8
      section_book_count_max: 14
      option_count_support:
        - 4
        - 6
      patch_width_ratio_min: 0.15
      patch_width_ratio_max: 0.30
      patch_height_ratio_min: 0.15
      patch_height_ratio_max: 0.26
      patch_area_ratio_max: 0.065
      crop_margin_px: 34

rendering:
  shared:
    library_canvas_width: 1280
    library_canvas_height: 900
    library_render_scale: 2
    library_setting_weights:
      reading_room: 1.0
      archive_room: 1.0
      childrens_corner: 1.0
    style_weights:
      flat_vector: 1.0
      outlined_cartoon: 1.0
      paper_cutout: 1.0
      soft_shadow: 1.0
    art_style_support:
      - flat_vector
      - outlined_cartoon
      - paper_cutout
      - soft_shadow
      - watercolor_wash
    art_style_weights:
      flat_vector: 1.0
      outlined_cartoon: 1.0
      paper_cutout: 1.0
      soft_shadow: 1.0
      watercolor_wash: 1.0
  task_overrides:
