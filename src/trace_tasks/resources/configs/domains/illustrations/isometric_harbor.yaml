generation:
  shared:
    balanced_sampling: true
  task_overrides:
    task_illustrations__isometric_harbor__boat_side_count:
      query_id_support:
        - left_side_boat_count
        - right_side_boat_count
      answer_count_support:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
    task_illustrations__isometric_harbor__boat_mooring_status_count:
      query_id_support:
        - moored_boat_count
        - open_water_boat_count
      answer_count_support:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
      other_count_support:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
    task_illustrations__isometric_harbor__boat_heading_status_count:
      query_id_support:
        - toward_shoreline_boat_count
        - away_from_shoreline_boat_count
      answer_count_support:
        - 1
        - 2
        - 3
        - 4
        - 5
    task_illustrations__isometric_harbor__shoreline_nearest_boat_label:
      query_id_support:
        - single

rendering:
  shared:
    canvas_profile_support:
      - landscape
      - square

prompt:
  task_overrides:
    task_illustrations__isometric_harbor__boat_side_count:
      bundle_id: illustrations_isometric_harbor_v1
