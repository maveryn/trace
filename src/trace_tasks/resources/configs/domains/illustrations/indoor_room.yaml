prompt:
  task_overrides:
    task_illustrations__indoor_room__surface_object_count:
      bundle_id: illustrations_indoor_room_v0
      scene_key: indoor_room_canvas
      task_key: object_type_on_surface_count_task
      answer_hint_object_type_on_surface: set "answer" to the count of {object_name} objects on the {surface_name} as an integer
      annotation_hint_object_type_on_surface: set "annotation" to a JSON array of [x0, y0, x1, y1] boxes in image pixel coordinates around each counted {object_name} object on the {surface_name}
      json_example_object_type_on_surface: '{"annotation":[[462,347,522,407],[596,344,660,404]],"answer":2}'
      json_example_answer_only_object_type_on_surface: '{"answer":2}'
    task_illustrations__indoor_room__furniture_side_count:
      bundle_id: illustrations_indoor_room_v0
      scene_key: indoor_room_canvas
      task_key: furniture_side_count_task
      answer_hint_furniture_side: set "answer" to the count of {object_name} objects {relation_word} the {furniture_name} as an integer
      annotation_hint_furniture_side: set "annotation" to a JSON array of [x0, y0, x1, y1] boxes in image pixel coordinates around each counted {object_name} object {relation_word} the {furniture_name}
      json_example_furniture_side: '{"annotation":[[147,461,207,521],[254,504,314,564],[331,431,391,491]],"answer":3}'
      json_example_answer_only_furniture_side: '{"answer":3}'
    task_illustrations__indoor_room__rotated_tile_label:
      bundle_id: illustrations_indoor_room_v0
      scene_key: indoor_room_canvas
      task_key: rotated_tile_label_task
      answer_hint_rotated_tile: set "answer" to the letter of the rotated tile
      annotation_hint_rotated_tile: set "annotation" to one [x0, y0, x1,
        y1] box around the rotated tile in image pixel coordinates
      json_example_rotated_tile: '{"annotation":[350,42,670,362],"answer":"B"}'
      json_example_answer_only_rotated_tile: '{"answer":"B"}'
    task_illustrations__indoor_room__missing_patch_label:
      bundle_id: illustrations_indoor_room_v0
      scene_key: indoor_room_canvas
      task_key: missing_patch_label_task
      answer_hint_missing_patch: set "answer" to the selected option letter as a string
      annotation_hint_missing_patch: set "annotation" to a JSON object with keys "missing_region" and "selected_option", each mapped to a [x0, y0, x1, y1] box in image pixel coordinates
      json_example_missing_patch: '{"annotation":{"missing_region":[214,128,374,252],"selected_option":[562,676,722,800]},"answer":"C"}'
      json_example_answer_only_missing_patch: '{"answer":"C"}'
    task_illustrations__indoor_room__swapped_tile_pair_label:
      bundle_id: illustrations_indoor_room_v0
      scene_key: indoor_room_canvas
      task_key: swapped_tile_pair_label_task
      answer_hint_swapped_tile_pair: set "answer" to the selected option letter
      annotation_hint_swapped_tile_pair: set "annotation" to a JSON array containing two [x0, y0, x1, y1] boxes around the two swapped numbered cells
      json_example_swapped_tile_pair: '{"annotation":[[0,0,400,266],[800,532,1200,798]],"answer":"C"}'
      json_example_answer_only_swapped_tile_pair: '{"answer":"C"}'
