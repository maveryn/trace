visual:
  background:
    enabled: true
    styles:
      solid_light:
        kind: solid
        color: [248, 248, 248]
      cool_light:
        kind: solid
        color: [246, 249, 251]
      warm_light:
        kind: solid
        color: [251, 249, 244]
      paper_light:
        kind: solid
        color: [250, 248, 241]
      mint_light:
        kind: solid
        color: [244, 250, 247]
      lavender_light:
        kind: solid
        color: [248, 247, 252]
    weights:
      solid_light: 1.0
      cool_light: 1.0
      warm_light: 1.0
      paper_light: 1.0
      mint_light: 1.0
      lavender_light: 1.0
  noise:
    apply_prob: 0.5
    edit_count_range: [1, 1]
    value_ranges:
      blur:
        radius: [0.12, 0.35]
      downsample:
        scale: [0.9, 0.97]
      jpeg:
        quality: [80.0, 94.0]
      noise:
        alpha: [0.01, 0.035]
