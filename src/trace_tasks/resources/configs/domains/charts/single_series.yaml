generation:
  shared:
    mark_count_min: 6
    mark_count_max: 10
    value_min: 1
    value_max: 20
    target_answer_min: 0
    target_answer_max: 20
    scene_variant_weights:
      area: 1.0
      bar: 1.0
      line: 1.0
      scatter: 1.0
      horizontal_bar: 1.0
      dot_plot: 1.0
      lollipop: 1.0
    balanced_scene_variant_sampling: true
    value_window_enabled: false
    share_percent_values: [10, 15, 20, 25, 30, 40, 50, 60]
    baseline_percent_values: [25, 50, 75, 100]
rendering:
  shared:
    chart_context_profile: report_paragraph
    chart_context_mode_weights:
      clean: 0.3
      minimal: 0.4
      paragraph_box: 0.3
    canvas_width: 1000
    canvas_height: 640
    plot_margin_left_px: 92
    plot_margin_right_px: 46
    plot_margin_top_px: 44
    plot_margin_bottom_px: 92
    axis_line_width_px: 2
    grid_line_width_px: 1
    tick_length_px: 8
    label_font_size_px: 20
    tick_font_size_px: 17
    label_bold: false
    label_stroke_width_px: 0
    mark_outline_width_px: 2
    line_width_px: 4
    point_radius_px: 8
    bar_width_fraction: 0.58
    mark_color_channel_min: 0
    mark_color_channel_max: 220
    mark_color_min_distance: 40.0
    mark_color_distance_space: lab
    guide_line_mode: always
    axis_line_width_px_min: 1
    axis_line_width_px_max: 2
    line_width_px_min: 2
    line_width_px_max: 4
    point_radius_px_min: 5
    point_radius_px_max: 8
    value_axis_major_tick_step: 10
    layout_jitter_enabled: true
    layout_jitter_x_px_min: -14
    layout_jitter_x_px_max: 14
    layout_jitter_y_px_min: -10
    layout_jitter_y_px_max: 10
    layout_jitter_min_margin_px: 26
prompt:
  shared:
    bundle_id: charts_trend_v1
visual:
  noise:
    apply_prob: 0.5
    edit_count_range: [1, 1]
    value_ranges:
      blur:
        radius: [0.04, 0.16]
      downsample:
        scale: [0.97, 0.99]
      jpeg:
        quality: [89.0, 96.0]
      noise:
        alpha: [0.004, 0.012]
