    scene_variant_weights:
      clean_wheel: 1.0
      notebook_wheel: 1.0
      exam_scan: 1.0
    balanced_scene_variant_sampling: true
    option_count: 6
  task_overrides:
    task_symbolic__radial_code_wheel__missing_code_symbol_label:
      missing_position_support:
      - inner
      - middle
      - outer
      answer_symbol_weights:
