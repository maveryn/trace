generation:
  shared:
    balanced_scene_variant_sampling: true
    scene_variant_weights:
      clean_worksheet: 1.0
      exam_scan: 1.0
      notebook_problem: 1.0
  task_overrides:
    task_symbolic__organic_structure__bond_order_count:
      balanced_target_bond_order_sampling: true
      target_bond_order_weights:
        double: 1.0
        triple: 1.0
      target_answer_min: 1
      target_answer_max: 5
    task_symbolic__organic_structure__ring_size_count:
      balanced_target_ring_size_sampling: true
      target_ring_size_weights:
        '5': 1.0
        '6': 1.0
      target_answer_min: 1
      target_answer_max: 5

rendering:
  shared:
    canvas_width: 1180
    canvas_height: 820
    unit_size_scale_min: 0.5
    unit_size_scale_max: 1.0
    organic_bond_width_px: 4
    organic_bond_gap_px: 10
    organic_structure_width_px: 980
    organic_structure_height_px: 590
  task_overrides:
    task_symbolic__organic_structure__bond_order_count:
      organic_effective_unit_size_scale_min: 0.85
      organic_bond_width_px: 5
      organic_bond_gap_px: 11
    task_symbolic__organic_structure__ring_size_count:
      organic_effective_unit_size_scale_min: 0.85
      organic_bond_width_px: 5
      organic_bond_gap_px: 11

prompt:
  shared:
    bundle_id: symbolic_organic_structure_v1
    scene_key: organic_structure
  task_overrides:
    task_symbolic__organic_structure__bond_order_count:
      task_key: organic_structure_bond_order_count
    task_symbolic__organic_structure__ring_size_count:
      task_key: organic_structure_ring_size_count

visual:
  noise:
    apply_prob: 0.5
    edit_count_range:
      - 1
      - 1
    value_ranges:
      blur:
        radius:
          - 0.05
          - 0.22
      downsample:
        scale:
          - 0.96
          - 0.99
      jpeg:
        quality:
          - 88.0
          - 96.0
      noise:
        alpha:
          - 0.004
          - 0.018
