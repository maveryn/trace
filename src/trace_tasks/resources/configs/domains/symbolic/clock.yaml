      alarm_hour_max: 12
      min_alarm_hand_gap_deg: 20.0
      option_label_support:
      - A
      - B
      - C
      - D
      - E
      - F
      option_count: 6
      correct_option_label_weights:
        A: 1.0
        B: 1.0
        C: 1.0
        D: 1.0
        E: 1.0
        F: 1.0
    task_symbolic__clock__time_extremum_label:
      clock_label_support:
      - A
      - B
      - C
      - D
      - E
      - F
      clock_count_support:
      - 6
      min_compare_gap_minutes: 15
    task_symbolic__clock__equivalent_time_label:
      digital_display_palette_weights:
        charcoal_mint: 1.0
        navy_cyan: 1.0
        graphite_amber: 1.0
        cream_ink: 1.0
        blue_lcd: 1.0
        wine_rose: 1.0
        forest_lime: 1.0
        plum_ice: 1.0
      balanced_digital_display_palette_sampling: true
      option_label_support:
      - A
      - B
      - C
      - D
      - E
      - F
      option_count: 6
      min_option_gap_minutes: 10
    task_symbolic__clock__elapsed_time_value:
      elapsed_minutes_support:
        min: 15
        max: 360
        step: 15
      option_label_support:
      - A
      - B
      - C
      - D
      - E
      - F
      option_count: 6
      correct_option_label_weights:
