      - 1
      - 2
      - 3
      option_label_support:
      - A
      - B
      - C
      - D
      option_count: 4
      min_option_gap_minutes: 10
    task_symbolic__clock__time_order_label:
      clock_label_support:
      - A
      - B
      - C
      - D
      option_label_support:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
      option_count: 6
      min_compare_gap_minutes: 20

