      option_label_support:
      - A
      - B
      - C
      - D
      - E
      - F
      option_count: 6
      correct_option_label_weights:
        A: 1.0
        B: 1.0
        C: 1.0
        D: 1.0
        E: 1.0
        F: 1.0
    task_symbolic__clock__alarm_wait_time_value:
