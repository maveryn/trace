generation:
  shared:
    balanced_scene_variant_sampling: true
    scene_variant_weights:
      clean_card: 1.0
      wood_frame: 1.0
      worksheet: 1.0
  task_overrides:
    task_symbolic__abacus__displayed_value_readout:
      target_answer_min: 0
      target_answer_max: 999
      option_label_support:
      - A
      - B
      - C
      - D
      - E
      - F
      option_count: 6
      balanced_correct_option_label_sampling: true
      correct_option_label_weights:
        A: 1.0
        B: 1.0
        C: 1.0
        D: 1.0
        E: 1.0
        F: 1.0
    task_symbolic__abacus__place_digit_readout:
      target_value_min: 0
      target_value_max: 999
      balanced_target_column_role_sampling: true
      target_column_role_weights:
        hundreds: 1.0
        tens: 1.0
        ones: 1.0
      option_label_support:
      - A
      - B
      - C
      - D
      - E
      - F
      option_count: 6
      balanced_correct_option_label_sampling: true
      correct_option_label_weights:
        A: 1.0
        B: 1.0
        C: 1.0
        D: 1.0
        E: 1.0
        F: 1.0
    task_symbolic__abacus__target_value_match_label:
      option_label_support:
      - A
      - B
      - C
      - D
      - E
      - F
      option_count: 6
      balanced_correct_option_label_sampling: true
      correct_option_label_weights:
        A: 1.0
        B: 1.0
        C: 1.0
        D: 1.0
        E: 1.0
        F: 1.0
      target_value_min: 0
      target_value_max: 999

visual:
  noise:
    apply_prob: 0.18
    edit_count_range:
    - 1
    - 1
    value_ranges:
      blur:
        radius:
        - 0.05
        - 0.22
      downsample:
        scale:
        - 0.96
        - 0.99
      jpeg:
        quality:
        - 88.0
        - 96.0
      noise:
        alpha:
        - 0.004
        - 0.018

