generation:
  shared:
    balanced_scene_variant_sampling: true
    balanced_rule_variant_sampling: true
    balanced_agent_board_style_sampling: true
    agent_rows_min: 3
    agent_rows_max: 5
    agent_cols_min: 3
    agent_cols_max: 5
    agent_final_steps_min: 3
    agent_final_steps_max: 6
    agent_future_steps_min: 3
    agent_future_steps_max: 6
    pose_option_count: 4
    grid_option_count: 4
    rule_variant_weights:
      binary_rule: 1.0
      three_state_rule: 1.0
    scene_variant_weights:
      clean_grid: 1.0
      lab_panel: 1.0
      notebook_grid: 1.0
    agent_board_style_weights:
      classic_grid: 1.0
      rounded_tiles: 1.0
      inset_cells: 1.0
      lab_matrix: 1.0
      notebook_cells: 1.0

rendering:
  shared:
    canvas_width: 1040
    canvas_height: 880
    cell_size_px: 56
    unit_size_scale_min: 0.5
    unit_size_scale_max: 1.0
    grid_gap_px: 2
    panel_padding_px: 28
    panel_corner_radius_px: 22
    panel_border_width_px: 3
    grid_line_width_px: 2
    option_card_width_px: 170
    option_card_height_px: 170
    option_gap_px: 18
    option_grid_cell_px: 24
    label_font_size_px: 22
    small_font_size_px: 16
    arrow_width_px: 6

prompt:
  shared:
    bundle_id: symbolic_agent_automaton_v1
    scene_key: agent_automaton

visual:
  background:
    enabled: true
    styles:
      automaton_plain:
        kind: solid
        color: [248, 250, 252]
      automaton_cool:
        kind: solid
        color: [244, 248, 251]
      automaton_warm:
        kind: solid
        color: [250, 248, 244]
    weights:
      automaton_plain: 1.0
      automaton_cool: 1.0
      automaton_warm: 1.0
  noise:
    apply_prob: 0.5
    edit_count_range: [1, 2]
