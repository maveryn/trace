    endpoint_label_background_rgb:
    - 255
    - 255
    - 255
prompt:
  shared:
    bundle_id: icons_named_path_v1
    scene_key: named_path_relation
    task_key: path_neighbor_query
  task_overrides:
    task_icons__named_path__path_distance_value:
      task_key: path_distance_query
      object_description: a START-to-END icon path with icon types placed on path stops
      question_text: How many path stops are strictly between the "{first_shape_name}" icon and the "{second_shape_name}" icon along the path from START to END?
      annotation_hint: set "annotation" to an array of [x0, y0, x1, y1] bounding boxes in image pixel coordinates for every counted path stop strictly between the two named icons
      answer_hint: set "answer" to the number of path stops strictly between the two named icons as an integer
      json_example: '{"annotation":[[252,244,312,304],[368,252,428,312],[486,240,546,300],[602,248,662,308]],"answer":4}'
      json_example_answer_only: '{"answer":4}'
