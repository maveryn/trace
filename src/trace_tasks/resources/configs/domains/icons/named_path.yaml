generation:
  shared:
    candidate_count: 6
    distractor_count_min: 4
    distractor_count_max: 8
    target_occurrence_count_min: 2
    target_occurrence_count_max: 4
    named_color_support:
    - red
    - blue
    - green
    - yellow
    - orange
    - purple
    - brown
    - cyan
    - magenta
    - maroon
    named_icon_fill_style_support:
    - solid
    - striped
    - dotted
    named_icon_fill_style_weights:
      solid: 0.55
      striped: 0.15
      dotted: 0.15
  task_overrides:
    task_icons__named_path__path_distance_value:
      distance_answer_min: 1
      distance_answer_max: 8
      extra_stop_count_min: 2
      extra_stop_count_max: 6
