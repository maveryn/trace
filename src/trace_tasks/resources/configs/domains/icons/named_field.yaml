prompt:
  shared:
    bundle_id: icons_named_field_v1
    scene_key: single_scene_counting
    task_key: counting_query
  task_overrides:
    task_icons__named_field__single_attribute_membership_count:
      scene_key: single_scene_counting
      object_description: a panel of icons
      question_text: How many "{shape_name}" icons are in the panel?
      annotation_hint: set "annotation" to a JSON array of [x0, y0, x1, y1] bounding boxes in image pixel coordinates for every counted
        "{shape_name}" icon
      answer_hint: set "answer" to the count as an integer
      json_example: '{"annotation":[[112,124,172,184],[630,298,690,358]],"answer":2}'
      json_example_answer_only: '{"answer":2}'
      bundle_id: icons_named_field_v1
      task_key: counting_query
    task_icons__named_field__multi_attribute_and_count:
      scene_key: single_scene_counting
      object_description: a panel of colored icons
      question_text_shape_and_color_count: How many icons are "{shape_name}" icons and have {attribute_phrase}?
      question_text_shape_or_color_count: How many icons are "{shape_name}" icons, have {attribute_phrase}, or both?
      question_text_shape_and_not_color_count: How many icons are "{shape_name}" icons but do not have {attribute_phrase}?
      question_text_color_and_not_shape_count: How many icons have {attribute_phrase} but are not "{shape_name}" icons?
      question_text_neither_shape_nor_color_count: How many icons are neither "{shape_name}" icons nor icons with {attribute_phrase}?
