prompt:
  shared:
    bundle_id: icons_paired_canvas_v0
    scene_key: paired_canvas_set_relation
    task_key: paired_canvas_query
  task_overrides:
    task_icons__paired_canvas__panel_set_relation_count:
      scene_key: paired_canvas_set_relation
      object_description: two icon panels labeled Left and Right
      question_text_added_in_right_count: How many Right-panel icons are new, meaning
        they do not exactly match any icon in the Left panel?
      question_text_missing_from_right_count: How many Left-panel icons are missing
        from the Right panel?
      annotation_hint: set "annotation" to a JSON array of [x0, y0, x1, y1] boxes
        in image pixel coordinates for every counted icon in the relevant panel
      answer_hint: set "answer" to the count as an integer
      json_example: '{"annotation":[[620,156,684,220],[834,338,902,406]],"answer":2}'
      json_example_answer_only: '{"answer":2}'
    task_icons__paired_canvas__color_change_count:
      scene_key: paired_canvas_attribute_change
      object_description: two icon panels labeled Left and Right with corresponding
        icons at matching positions
      question_text_color_changed_count: How many Right-panel icons changed color
        compared with the corresponding icon in the Left panel?
      annotation_hint: set "annotation" to a JSON array of [x0, y0, x1, y1] boxes
        in image pixel coordinates for every counted Right-panel icon
      answer_hint: set "answer" to the count as an integer
      json_example: '{"annotation":[[620,156,684,220],[834,338,902,406]],"answer":2}'
      json_example_answer_only: '{"answer":2}'
    task_icons__paired_canvas__rotation_change_count:
      scene_key: paired_canvas_attribute_change
      object_description: two icon panels labeled Left and Right with corresponding
        icons at matching positions
      question_text_rotation_changed_count: How many Right-panel icons changed rotation
        compared with the corresponding icon in the Left panel?
      annotation_hint: set "annotation" to a JSON array of [x0, y0, x1, y1] boxes
        in image pixel coordinates for every counted Right-panel icon
      answer_hint: set "answer" to the count as an integer
      json_example: '{"annotation":[[620,156,684,220],[834,338,902,406]],"answer":2}'
      json_example_answer_only: '{"answer":2}'
