prompt:
  shared:
    bundle_id: icons_pair_grid_v1
    scene_key: reference_pair_grid
    task_key: relation_match_label_query
  task_overrides:
    task_icons__pair_grid__reference_color_pair_match_label:
      bundle_id: icons_pair_grid_v1
      scene_key: reference_pair_grid
      task_key: relation_match_label_query
      object_description: a Reference pair beside a labeled Scene grid
      question_text: Which labeled Scene cell has the same left and right colors as the Reference pair?
      annotation_hint: set "annotation" to one [x0, y0, x1, y1] box in image pixel coordinates around the selected Scene cell
      answer_hint: set "answer" to the selected option letter as a string
      json_example: '{"annotation":[336,104,506,274],"answer":"A"}'
      json_example_answer_only: '{"answer":"A"}'
    task_icons__pair_grid__reference_transform_match_label:
      bundle_id: icons_pair_grid_v1
      scene_key: reference_pair_grid
      task_key: relation_match_label_query
      object_description: a Reference pair beside a labeled Scene grid
      question_text: Which labeled Scene cell shows the same before-to-after transformation as the Reference pair?
      annotation_hint: set "annotation" to one [x0, y0, x1, y1] box in image pixel coordinates around the selected Scene cell
      answer_hint: set "answer" to the selected option letter as a string
      json_example: '{"annotation":[336,104,506,274],"answer":"A"}'
      json_example_answer_only: '{"answer":"A"}'
