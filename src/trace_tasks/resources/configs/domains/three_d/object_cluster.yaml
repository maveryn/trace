rendering:
  shared:
    canvas_width: 1180
    canvas_height: 900
    scene_margin_left_px: 44
    scene_margin_right_px: 44
    scene_margin_top_px: 36
    scene_margin_bottom_px: 42
    room_extent: 2.85
    room_height: 3.0
    grid_step: 0.0
    marker_radius_px: 22
    label_font_size_px: 24
    line_width_px: 2
    full_bleed_floor: true
    full_bleed_floor_extent_multiplier: 3.4
