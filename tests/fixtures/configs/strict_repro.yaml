output_root: ./out

dataset_name: strict_repro_smoke
instance_version: v0
image_format: png
strict_repro: true
max_attempts_per_instance: 100
sampling_seed: 0
tasks:
  - task_id: task_puzzles__cell_board__shortest_path_length_value
    count: 5
    params:
      query_id: single
      board_size_min: 7
      board_size_max: 7
      target_shortest_len_min: 4
      target_shortest_len_max: 10
      aspect_ratio_min: 1.0
      aspect_ratio_max: 1.0
